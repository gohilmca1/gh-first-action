name: Controlling Workflow
on: push
jobs:
  first-job:
    uses:  ./.github/workflows/reusable-workflow.yml
    with:
      message-text: Jay Mataji..
  reusing-workflow:
    needs: first-job
    uses: ./.github/workflows/reusable-workflow.yml
  second-job:
    runs-on: ubuntu-latest
    steps:
      - name: Get repo code
        uses: actions/checkout@v6
      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '25'
        id: run-java
      - run: java C.java
      - name: After C Java completes
        if: failure() || steps.run-java.outputs == 'failure'
        run: echo "After C Java completes" + "${{steps.run-java.outputs}}"
      - name: test
        run: echo "${{steps.run-java.outcome}}"
  third-job:
    if: failure()
    needs: second-job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '25'
      - run: java C.java
  fourth-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '25'
      - run: java C.java
